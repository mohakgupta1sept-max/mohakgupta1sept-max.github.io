<svg viewBox="0 0 700 300" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Diagram showing how to read an Intel processor model number: i5-1135G7 breaks into tier i5, generation 11, SKU 35, and suffix G7.">
  <rect width="700" height="300" fill="#FCFCFA"/>

  <text x="30" y="38" font-family="monospace" font-size="13" letter-spacing="1.5" fill="#0B7A65">READING AN INTEL MODEL NUMBER</text>
  <line x1="30" y1="52" x2="670" y2="52" stroke="#16211F" stroke-width="2"/>

  <text x="30" y="126" font-family="monospace" font-size="52" font-weight="600" fill="#16211F">i5</text>
  <text x="106" y="126" font-family="monospace" font-size="52" font-weight="600" fill="#66716D">-</text>
  <text x="140" y="126" font-family="monospace" font-size="52" font-weight="600" fill="#0B7A65">11</text>
  <text x="216" y="126" font-family="monospace" font-size="52" font-weight="600" fill="#16211F">35</text>
  <text x="292" y="126" font-family="monospace" font-size="52" font-weight="600" fill="#66716D">G7</text>

  <path d="M 50 145 L 50 175" stroke="#66716D" stroke-width="1.5"/>
  <text x="50" y="196" font-family="monospace" font-size="12" fill="#16211F" text-anchor="middle">TIER</text>
  <text x="50" y="214" font-family="sans-serif" font-size="12" fill="#66716D" text-anchor="middle">i3 / i5 / i7</text>

  <path d="M 172 145 L 172 175" stroke="#0B7A65" stroke-width="2.5"/>
  <text x="172" y="196" font-family="monospace" font-size="12" font-weight="600" fill="#0B7A65" text-anchor="middle">GENERATION</text>
  <text x="172" y="214" font-family="sans-serif" font-size="12" fill="#0B7A65" text-anchor="middle">this is the one</text>
  <text x="172" y="230" font-family="sans-serif" font-size="12" fill="#0B7A65" text-anchor="middle">that matters</text>

  <path d="M 248 145 L 248 175" stroke="#66716D" stroke-width="1.5"/>
  <text x="248" y="196" font-family="monospace" font-size="12" fill="#16211F" text-anchor="middle">SKU</text>
  <text x="248" y="214" font-family="sans-serif" font-size="12" fill="#66716D" text-anchor="middle">relative speed</text>

  <path d="M 320 145 L 320 175" stroke="#66716D" stroke-width="1.5"/>
  <text x="320" y="196" font-family="monospace" font-size="12" fill="#16211F" text-anchor="middle">SUFFIX</text>
  <text x="320" y="214" font-family="sans-serif" font-size="12" fill="#66716D" text-anchor="middle">U = low power</text>
  <text x="320" y="230" font-family="sans-serif" font-size="12" fill="#66716D" text-anchor="middle">H = high power</text>

  <rect x="420" y="72" width="250" height="150" fill="#E8F3F0" stroke="#0B7A65" stroke-width="0" />
  <rect x="420" y="72" width="4" height="150" fill="#0B7A65"/>
  <text x="440" y="98" font-family="monospace" font-size="11" font-weight="600" letter-spacing="1" fill="#085848">OLDER FORMAT</text>
  <text x="440" y="128" font-family="monospace" font-size="24" font-weight="600" fill="#16211F">i5-<tspan fill="#0B7A65">7</tspan>200U</text>
  <text x="440" y="156" font-family="sans-serif" font-size="13" fill="#66716D">Four digits after the dash?</text>
  <text x="440" y="176" font-family="sans-serif" font-size="13" fill="#66716D">Only the first digit is the</text>
  <text x="440" y="196" font-family="sans-serif" font-size="13" fill="#66716D">generation. This is 7th gen.</text>

  <line x1="30" y1="256" x2="670" y2="256" stroke="#D8E0DD" stroke-width="1"/>
  <text x="30" y="280" font-family="sans-serif" font-size="13" fill="#66716D">A newer i3 regularly beats an older i5. Check the generation before the tier.</text>
</svg>
