<svg viewBox="0 0 700 340" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Bar chart of memory used during a study session: Windows 11 uses 3.2GB, Chrome with a mock test 1.3GB, a YouTube class tab 0.7GB, a PDF reader 0.4GB, and messaging apps 0.4GB, totalling about 6GB against a 4GB and an 8GB limit.">
  <rect width="700" height="340" fill="#FCFCFA"/>

  <text x="30" y="34" font-family="monospace" font-size="13" letter-spacing="1.5" fill="#0B7A65">MEMORY USED — TYPICAL STUDY SESSION</text>
  <line x1="30" y1="48" x2="670" y2="48" stroke="#16211F" stroke-width="2"/>

  <!-- scale: 0 to 9GB across x=190..640  => 50px per GB -->

  <!-- 4GB limit line -->
  <line x1="390" y1="62" x2="390" y2="256" stroke="#66716D" stroke-width="1.5" stroke-dasharray="4 4"/>
  <text x="390" y="276" font-family="monospace" font-size="11" fill="#66716D" text-anchor="middle">4GB</text>
  <text x="390" y="292" font-family="sans-serif" font-size="11" fill="#66716D" text-anchor="middle">not enough</text>

  <!-- 8GB limit line -->
  <line x1="590" y1="62" x2="590" y2="256" stroke="#0B7A65" stroke-width="2"/>
  <text x="590" y="276" font-family="monospace" font-size="11" font-weight="600" fill="#0B7A65" text-anchor="middle">8GB</text>
  <text x="590" y="292" font-family="sans-serif" font-size="11" fill="#0B7A65" text-anchor="middle">comfortable</text>

  <!-- bars, cumulative -->
  <text x="175" y="86" font-family="sans-serif" font-size="13" fill="#16211F" text-anchor="end">Windows 11 idle</text>
  <rect x="190" y="72" width="160" height="20" fill="#16211F"/>
  <text x="360" y="87" font-family="monospace" font-size="12" fill="#66716D">3.2 GB</text>

  <text x="175" y="120" font-family="sans-serif" font-size="13" fill="#16211F" text-anchor="end">Chrome + mock test</text>
  <rect x="190" y="106" width="65" height="20" fill="#0B7A65"/>
  <text x="265" y="121" font-family="monospace" font-size="12" fill="#66716D">1.3 GB</text>

  <text x="175" y="154" font-family="sans-serif" font-size="13" fill="#16211F" text-anchor="end">YouTube class tab</text>
  <rect x="190" y="140" width="35" height="20" fill="#0B7A65"/>
  <text x="235" y="155" font-family="monospace" font-size="12" fill="#66716D">0.7 GB</text>

  <text x="175" y="188" font-family="sans-serif" font-size="13" fill="#16211F" text-anchor="end">PDF reader</text>
  <rect x="190" y="174" width="20" height="20" fill="#0B7A65"/>
  <text x="220" y="189" font-family="monospace" font-size="12" fill="#66716D">0.4 GB</text>

  <text x="175" y="222" font-family="sans-serif" font-size="13" fill="#16211F" text-anchor="end">WhatsApp / Telegram</text>
  <rect x="190" y="208" width="20" height="20" fill="#0B7A65"/>
  <text x="220" y="223" font-family="monospace" font-size="12" fill="#66716D">0.4 GB</text>

  <!-- total -->
  <line x1="190" y1="240" x2="640" y2="240" stroke="#D8E0DD" stroke-width="1"/>
  <text x="175" y="256" font-family="monospace" font-size="13" font-weight="600" fill="#16211F" text-anchor="end">TOTAL</text>
  <rect x="190" y="242" width="300" height="20" fill="#085848"/>
  <text x="500" y="257" font-family="monospace" font-size="13" font-weight="600" fill="#085848">6.0 GB</text>

  <line x1="30" y1="308" x2="670" y2="308" stroke="#D8E0DD" stroke-width="1"/>
  <text x="30" y="330" font-family="sans-serif" font-size="13" fill="#66716D">On 4GB, everything past Windows spills onto slow storage. This is why the laptop freezes mid-test.</text>
</svg>
